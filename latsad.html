<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מורשת הענף - חידון</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>שאלות מורשת הענף</h1>
            <div class="stats-bar">
                <div class="progress-info">
                    <span id="currentStepText">שאלה 1 מתוך 2</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width: 50%;"></div>
                </div>
            </div>
        </header>

        <!-- Quiz Card -->
        <main class="quiz-card" id="quizCard">
            <!-- Image Area (Shown when question has image) -->
            <div class="image-box" id="imageBox">
                <img id="quizImage" src="לצד.jpeg" alt="תמונת המורשת">
                <div class="mystery-overlay" id="mysteryOverlay">
                    <i class="fa-solid fa-lock"></i>
                    <span>ענה נכון כדי לחשוף את התמונה</span>
                </div>
            </div>

            <!-- Instructions / Question Text -->
            <div class="instructions-text" id="questionText">מה שם ענף ה"א בהקמתו?</div>

            <!-- Feedback Alert -->
            <div class="feedback-msg" id="feedbackMsg"></div>

            <!-- 4 Options Buttons -->
            <div class="options-container" id="optionsContainer">
                <!-- Dynamic options -->
            </div>
        </main>

        <!-- Final Win Screen (Hidden by default) -->
        <div class="win-screen hidden" id="winScreen">
            <div class="win-content">
                <div class="lock-icon-container" id="lockIconContainer">
                    <i class="fa-solid fa-lock" id="lockIcon"></i>
                </div>
                <button class="restart-btn" id="restartBtn">
                    <i class="fa-solid fa-rotate-right"></i> שחק שוב
                </button>
            </div>
        </div>
    </div>

    <!-- Fullscreen Reveal Modal -->
    <div class="fullscreen-reveal" id="fullscreenReveal">
        <div class="reveal-content">
            <img id="fullscreenImg" src="" alt="תמונה נחשפת">
            <div class="big-revealed-text hidden" id="fullscreenText"></div>
            <div class="reveal-caption" id="revealCaption">תשובה נכונה! 🥳</div>
            <div class="reveal-timer" id="revealTimer">מעביר בעוד <span id="revealCountdown">2</span> שניות...</div>
        </div>
    </div>

    <script src="latsad.js"></script>
</body>
</html>
